<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKD PREMIUM LIVE — Standalone Core TV</title>
<!-- Tailwind CSS v4 -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- FontAwesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<!-- HLS JS Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>

<style>
  :root {
    --bg-main: #F8F9FA;
    --bg-card: #FFFFFF;
    --text-main: #0F172A;
    --border-color: rgba(0, 0, 0, 0.05);
    --modal-box: #FFFFFF;
  }
  
  [data-theme="dark"] {
    --bg-main: #0A0A0A;
    --bg-card: #121212;
    --text-main: #F8FAFC;
    --border-color: rgba(255, 255, 255, 0.05);
    --modal-box: #161616;
  }

  body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: background-color 0.4s ease, color 0.4s ease;
  }
  .font-display { font-family: 'Space Grotesk', sans-serif; }
  
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 99px; }
  [data-theme="dark"] ::-webkit-scrollbar-thumb { background: #334155; }

  @keyframes spin-premium {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .animate-spin-premium { animation: spin-premium 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite; }

  .bento-card {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
  }

  video::-webkit-media-controls { display: none !important; }
  video::-webkit-media-controls-enclosure { display: none !important; }
</style>
</head>
<body class="min-h-screen overflow-x-hidden antialiased select-none" data-theme="light">

  <!-- NAVIGATION BAR -->
  <nav id="navbar" class="fixed top-0 left-0 right-0 flex items-center justify-between px-[6%] py-5 z-40 transition-all duration-500">
    <div class="flex items-center gap-10">
      <h1 class="font-display text-xl font-bold tracking-tight flex items-center gap-2">
        OKD PREMIUM <span class="text-[10px] bg-neutral-900 dark:bg-white dark:text-black font-sans font-bold text-white px-2 py-0.5 rounded-full tracking-wider">V1</span>
      </h1>
    </div>
    
    <div class="flex items-center gap-4">
      <button onclick="toggleTheme()" class="w-9 h-9 rounded-full bg-white dark:bg-neutral-900 border border-neutral-200/60 dark:border-neutral-800 flex items-center justify-center text-sm shadow-xs cursor-pointer hover:scale-105 transition-transform">
        <i id="themeIcon" class="fa-solid fa-moon text-neutral-600 dark:text-neutral-400"></i>
      </button>
      <div id="clock" class="text-xs font-mono font-bold border px-4 py-1.5 rounded-full tracking-widest bg-white dark:bg-neutral-900 border-neutral-200/60 dark:border-neutral-800">--:--:--</div>
    </div>
  </nav>

  <!-- BANNER HEADER -->
  <div class="relative w-full pt-32 pb-12 px-[6%] overflow-hidden">
    <div class="relative z-20 max-w-3xl">
      <div class="inline-flex items-center gap-2 border px-3 py-1.5 rounded-full mb-6 bg-white dark:bg-neutral-900 border-neutral-200/60 dark:border-neutral-800">
        <span class="flex h-2 w-2 relative">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-500 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
        </span>
        <span class="text-[10px] font-bold tracking-widest uppercase text-neutral-500">Standalone App Player Mode</span>
      </div>
      <h2 class="font-display text-4xl md:text-6xl font-bold mb-4 tracking-tighter leading-[0.95]">
      OKD STREAM  <br><span class="opacity-50 font-light">IPTV STREAMING SERVICE</span>
      </h2>
    </div>
  </div>

  <!-- BENTO LAYOUT MAIN SECTION -->
  <main class="relative z-20 px-[6%] pb-24">
    <div class="flex items-center justify-between mb-8 border-b pb-4 border-neutral-200/60 dark:border-neutral-800">
      <div class="flex items-center gap-3">
        <span class="font-display text-xl font-bold tracking-tight">Active Channels</span>
        <span id="totalCount" class="text-[10px] font-bold bg-neutral-200/60 dark:bg-neutral-800 px-2.5 py-0.5 rounded-full font-mono">0</span>
      </div>
    </div>

    <!-- VERTICAL BENTO GRID System -->
    <div id="verticalBentoGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5"></div>
  </main>

  <!-- MASTER PLAYER MODAL -->
  <div id="playerModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8 transition-all duration-300" style="display: none; opacity: 0;">
    <div class="absolute inset-0 bg-black/70" onclick="closePlayer()"></div>
    
    <div class="relative w-full max-w-4xl rounded-[32px] overflow-hidden shadow-2xl z-10 border border-neutral-200/60 dark:border-neutral-800 transition-all duration-300" id="modalBox" style="background-color: var(--modal-box); transform: scale(0.95);">
      
      <!-- Top Bar -->
      <div class="flex items-center justify-between px-7 py-4 border-b border-neutral-200/40 dark:border-neutral-800/60">
        <div class="flex items-center gap-3">
          <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
          <h3 id="modalTitle" class="font-display text-sm font-bold tracking-tight">Terminal Player</h3>
        </div>
        
        <div class="flex items-center gap-3">
          <button onclick="reSyncStream()" class="text-[10px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-full bg-neutral-100 dark:bg-neutral-800 text-neutral-600 dark:text-neutral-300 border border-neutral-200 dark:border-neutral-700 flex items-center gap-1.5 hover:bg-neutral-900 hover:text-white dark:hover:bg-white dark:hover:text-black transition-all duration-300 cursor-pointer">
            <i class="fa-solid fa-rotate"></i> Re-Sync
          </button>
          <button onclick="closePlayer()" class="w-9 h-9 rounded-full bg-neutral-100 dark:bg-neutral-800 text-neutral-500 flex items-center justify-center text-sm border border-neutral-200/60 dark:border-neutral-700 transition-all duration-300 cursor-pointer">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
      </div>

      <!-- VIDEO CORE FRAME -->
      <div id="videoContainer" class="relative aspect-video bg-neutral-950 flex items-center justify-center group overflow-hidden">
        
        <!-- Floating Loading Spinner -->
        <div id="modalLoader" class="absolute pointer-events-none z-30 flex flex-col items-center justify-center transition-all duration-300" style="opacity: 1;">
          <div class="w-10 h-10 border-2 border-white/20 border-t-white rounded-full animate-spin-premium drop-shadow-md"></div>
        </div>

        <!-- HLS Native Video Node -->
        <video id="video" class="w-full h-full object-contain z-10" autoplay playsinline crossorigin="anonymous" style="display: none;"></video>
        
        <!-- YouTube Embed Node -->
        <iframe id="youtubePlayer" class="w-full h-full z-10" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen style="display: none;"></iframe>
        
        <!-- CUSTOM CONTROLS OVERLAY -->
        <div id="customControls" class="absolute inset-x-0 bottom-0 z-20 bg-gradient-to-t from-black/90 via-black/40 to-transparent p-4 flex flex-col gap-3 translate-y-4 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-300">
          <div class="flex items-center justify-between text-white px-2">
            <div class="flex items-center gap-5">
              <button onclick="togglePlay()" class="hover:text-emerald-500 text-base transition cursor-pointer"><i id="playIcon" class="fa-solid fa-pause"></i></button>
              <div class="flex items-center gap-2 group/vol">
                <button onclick="toggleMute()" class="hover:text-emerald-500 text-base transition cursor-pointer"><i id="volumeIcon" class="fa-solid fa-volume-high"></i></button>
                <input id="volumeSlider" type="range" min="0" max="1" step="0.1" value="1" oninput="setVolume(this.value)" class="w-0 group-hover/vol:w-16 transition-all duration-300 accent-white h-1 rounded-full appearance-none bg-white/30 cursor-pointer">
              </div>
            </div>
            <div class="text-[10px] font-black tracking-[0.3em] uppercase opacity-70 font-display">OKD WEB PLAYER</div>
            <div class="flex items-center gap-5">
              <button onclick="triggerPiP()" title="Picture-in-Picture" class="hover:text-blue-400 text-base transition cursor-pointer"><i class="fa-solid fa-window-restore"></i></button>
              <button onclick="toggleFullscreen()" title="Fullscreen" class="hover:text-emerald-400 text-base transition cursor-pointer"><i class="fa-solid fa-expand"></i></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer Panel -->
      <div class="px-7 py-4 text-xs text-neutral-400 flex justify-between items-center border-t border-neutral-200/40 dark:border-neutral-800/60 bg-neutral-50/50 dark:bg-neutral-900/20">
        <span id="modalStatus" class="flex items-center gap-2 font-medium"><i class="fa-solid fa-circle-notch animate-spin text-emerald-500"></i> Ready</span>
        <span class="tracking-widest text-[9px] bg-emerald-500 text-white px-3 py-1 rounded-full font-mono font-bold">DIRECT HARDWARE LINK</span>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="border-t border-neutral-200/60 dark:border-neutral-800 bg-white dark:bg-neutral-900 px-[6%] py-10 text-xs font-medium text-neutral-400 flex flex-col sm:flex-row justify-between items-center gap-4">
    <span>&copy; 2026 OKD LANKA . Unrestricted Standalone Engine.</span>
  </footer>

<script>
// 🔒 100% Direct Links (VLC Style - Play perfectly when run as a Local File)
const channels = [
  { name:"Siyatha TV",      tag:"HLS Broadcast", url:"https://rtmp01.voaplus.com/hls/6x6ik312qk4grfxocfcv.m3u8" },
  { name:"Veruban TV",      tag:"HLS Broadcast", url:"https://video-eu1.streamerr.co/hls/scb80244b91/live.m3u8" },
  { name:"Talent Tv",       tag:"HLS Broadcast", url:"https://cast.talenttv.lk/hls/mcrlo1ygwpu8x4bj/index.m3u8" },
  { name:"NDTV LANKA",      tag:"HLS Broadcast", url:"https://g4wlkqqwl23a-hls-live.5centscdn.com/NDTVLANKA/1ff5fa54d14c3ff6c6bd3918bbb7db5d.sdp/playlist.m3u8" },
    { name:"NDTV INDIA",      tag:"HLS Broadcast", url:"https://ndtv24x7elemarchana.akamaized.net/hls/live/2003678/ndtv24x7/master.m3u8 },
  { name:"Jaya TV",         tag:"HLS Broadcast", url:"https://live.jayatv.lk/hls/stream.m3u8" },
  { name:"Hiru Tv",         tag:"HLS Broadcast", url:"https://str001.peotv.lk/live2/hiru/stream_0/index.m3u8" },
  { name:"Karama TV",       tag:"YouTube Live",  url:"https://www.youtube.com/watch?v=8xfN8FLGRRU" },
  { name:"Pragana Tv",      tag:"YouTube Live",  url:"https://www.youtube.com/watch?v=76QGhfJgmE0" },
  { name:"The Buddist",     tag:"YouTube Live",  url:"https://www.youtube.com/watch?v=_cU58xfB2co" },
  { name:"Sirasa Tv",       tag:"PeoTV Stream",  url:"https://str001.peotv.lk/live2/sirasa/stream_0/index.m3u8" },
  { name:"Ada Derana ",       tag:"PeoTV Stream",  url:"https://str001.peotv.lk/live/ada-derana-24/stream_0/index.m3u8" },
  { name:"Charana Tv",      tag:"PeoTV Stream",  url:"https://str001.peotv.lk/live2/charana/stream_0/index.m3u8" },
  { name:"Derana TV",       tag:"PeoTV Stream",  url:"https://str001.peotv.lk/live2/derana/stream_0/index.m3u8" },
  { name:"Swaranawahini",   tag:"PeoTV Stream",  url:"https://str001.peotv.lk/live2/swarnawahini/stream_0/index.m3u8" },
  { name:"ITN",             tag:"PeoTV Stream",  url:"https://str001.peotv.lk/live2/itn/stream_0/index.m3u8" },
  { name:"Rupawahini",      tag:"PeoTV Stream",  url:"https://str001.peotv.lk/live2/rupavahini/stream_0/index.m3u8" },
  { name:"TV Supreme",      tag:"PeoTV Stream",  url:"https://str001.peotv.lk/live/tv-supreme/stream_0/index.m3u8" },
  { name:"Event Tv",        tag:"PeoTV Stream",  url:"https://str001.peotv.lk/live2/event-tv/stream_0/index.m3u8" },
  { name:"Haritha TV",      tag:"PeoTV Stream",  url:"https://str001.peotv.lk/live/haritha-tv/stream_0/index.m3u8" }
];

const verticalBentoGrid = document.getElementById('verticalBentoGrid');
const video = document.getElementById('video');
const youtubePlayer = document.getElementById('youtubePlayer');
const videoContainer = document.getElementById('videoContainer');
const customControls = document.getElementById('customControls');
const playerModal = document.getElementById('playerModal');
const modalBox = document.getElementById('modalBox');
const modalTitle = document.getElementById('modalTitle');
const modalLoader = document.getElementById('modalLoader');
const modalStatus = document.getElementById('modalStatus');
const navbar = document.getElementById('navbar');

let hls = null;
let activeCard = null;
let currentChannelData = null;

// Clean Right Click & Key Blocks
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
    e.preventDefault();
  }
});

window.addEventListener('scroll', () => {
  if (window.scrollY > 30) {
    navbar.classList.add('bg-white/80', 'dark:bg-black/80', 'backdrop-blur-xl', 'py-4');
  } else {
    navbar.classList.remove('bg-white/80', 'dark:bg-black/80', 'backdrop-blur-xl', 'py-4');
  }
});

function toggleTheme() {
  const currentTheme = document.body.getAttribute('data-theme');
  const icon = document.getElementById('themeIcon');
  if(currentTheme === 'light') {
    document.body.setAttribute('data-theme', 'dark');
    icon.className = 'fa-solid fa-sun text-amber-400';
  } else {
    document.body.setAttribute('data-theme', 'light');
    icon.className = 'fa-solid fa-moon text-neutral-600';
  }
}

function getYoutubeId(url) {
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
  const match = url.match(regExp);
  return (match && match[2].length === 11) ? match[2] : null;
}

function createCard(ch, i) {
  const card = document.createElement('div');
  const heightClass = (i % 3 === 0) ? 'h-40' : 'h-36';
  card.className = `bento-card relative w-full ${heightClass} rounded-[24px] cursor-pointer overflow-hidden transition-all duration-500 transform hover:-translate-y-2 hover:shadow-xl group`;
  card.innerHTML = `
    <div class="w-full h-full flex flex-col justify-between p-6 relative z-10">
      <div class="flex justify-between items-center">
        <span class="text-[9px] font-bold font-mono tracking-wider opacity-40">STATION ${String(i+1).padStart(2,'0')}</span>
        <div class="w-1.5 h-1.5 rounded-full bg-neutral-300 dark:bg-neutral-700 group-hover:bg-neutral-900 dark:group-hover:bg-white transition-all duration-300"></div>
      </div>
      <div>
        <div class="font-display text-base font-bold tracking-tight">${ch.name}</div>
        <div class="text-[11px] opacity-50 font-semibold mt-0.5 tracking-wide flex items-center gap-1.5">
          <span class="w-1 h-1 ${ch.url.includes('youtube.com') || ch.url.includes('youtu.be') ? 'bg-red-500' : 'bg-emerald-500'} rounded-full"></span> Standalone Mode
        </div>
      </div>
    </div>
    <div class="absolute inset-0 bg-neutral-950/[0.02] opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity duration-400 z-20">
      <div class="w-10 h-10 bg-neutral-950 dark:bg-white text-white dark:text-black rounded-full flex items-center justify-center shadow-md scale-90 group-hover:scale-100 transition-all duration-400">
        <i class="fa-solid fa-play text-xs ml-0.5"></i>
      </div>
    </div>
  `;
  card.addEventListener('click', () => triggerPlayer(ch, card));
  return card;
}

channels.forEach((ch, i) => {
  verticalBentoGrid.appendChild(createCard(ch, i));
});
document.getElementById('totalCount').textContent = channels.length;

function triggerPlayer(ch, card) {
  currentChannelData = ch;
  if(activeCard) activeCard.classList.remove('border-neutral-950', 'dark:border-white');
  card.classList.add('border-neutral-950', 'dark:border-white');
  activeCard = card;

  playerModal.style.display = 'flex';
  setTimeout(() => {
    playerModal.style.opacity = '1';
    modalBox.style.opacity = '1';
    modalBox.style.transform = 'scale(1)';
    
    // 🔥 INSTANT FULLSCREEN INVOCATION
    if (videoContainer.requestFullscreen) {
      videoContainer.requestFullscreen().catch(() => console.log("Fullscreen skipped"));
    } else if (videoContainer.webkitRequestFullscreen) {
      videoContainer.webkitRequestFullscreen();
    }
  }, 50);
  
  executeStreamPipeline(ch.url, ch.name);
}

function executeStreamPipeline(url, name) {
  modalLoader.style.opacity = '1';
  modalTitle.textContent = `${name} — Direct Stream Node`;
  
  const ytId = getYoutubeId(url);

  if (ytId) {
    video.style.display = 'none';
    customControls.style.display = 'none';
    youtubePlayer.style.display = 'block';
    
    youtubePlayer.src = `https://www.youtube.com/embed/${ytId}?autoplay=1&controls=1&rel=0&showinfo=0&modestbranding=1`;
    modalStatus.innerHTML = `<span class="text-red-500 font-bold"><i class="fa-brands fa-youtube mr-1.5"></i> YouTube Feed Active</span>`;
    
    setTimeout(() => { modalLoader.style.opacity = '0'; }, 800);
  } else {
    youtubePlayer.style.display = 'none';
    video.style.display = 'block';
    customControls.style.display = 'flex';
    youtubePlayer.src = ""; 
    
    modalStatus.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin text-neutral-400 mr-2"></i> Initializing Hardware Link...`;

    if(hls) { hls.destroy(); hls = null; }

    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.load();
    } else if (Hls.isSupported()) {
      hls = new Hls({ maxMaxBufferLength: 10, lowLatencyMode: true });
      hls.loadSource(url);
      hls.attachMedia(video);
      
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {
          modalStatus.innerHTML = `<span class="text-amber-500">Tap screen to play.</span>`;
          modalLoader.style.opacity = '0';
        });
      });

      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          modalStatus.innerHTML = `<span class="text-rose-500"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Stream linking dropped. Hit Re-Sync.</span>`;
          modalLoader.style.opacity = '0';
        }
      });
    }

    video.onplaying = () => {
      modalLoader.style.opacity = '0';
      document.getElementById('playIcon').className = 'fa-solid fa-pause';
      modalStatus.innerHTML = `<span class="text-emerald-500 font-bold flex items-center gap-2"><span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> Direct Hardware Connected</span>`;
    };

    video.onloadeddata = () => { modalLoader.style.opacity = '0'; };
  }
}

function togglePlay() {
  const icon = document.getElementById('playIcon');
  if (video.paused) { video.play(); icon.className = 'fa-solid fa-pause'; } 
  else { video.pause(); icon.className = 'fa-solid fa-play'; }
}

function toggleMute() {
  const icon = document.getElementById('volumeIcon');
  const slider = document.getElementById('volumeSlider');
  if (video.muted) { video.muted = false; icon.className = 'fa-solid fa-volume-high'; slider.value = video.volume; } 
  else { video.muted = true; icon.className = 'fa-solid fa-volume-xmark'; slider.value = 0; }
}

function setVolume(val) {
  video.volume = val; video.muted = val == 0;
  document.getElementById('volumeIcon').className = val == 0 ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
}

function triggerPiP() {
  if (document.pictureInPictureElement) document.exitPictureInPicture();
  else if (document.pictureInPictureEnabled) video.requestPictureInPicture();
}

function toggleFullscreen() {
  if (!document.fullscreenElement) videoContainer.requestFullscreen().catch(err => alert("Fullscreen error"));
  else document.exitFullscreen();
}

function reSyncStream() {
  if (currentChannelData) executeStreamPipeline(currentChannelData.url, currentChannelData.name);
}

function closePlayer() {
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
  
  video.pause();
  video.src = "";
  youtubePlayer.src = "";
  if(hls) { hls.destroy(); hls = null; }
  
  modalBox.style.transform = 'scale(0.95)';
  modalBox.style.opacity = '0';
  playerModal.style.opacity = '0';
  setTimeout(() => { playerModal.style.display = 'none'; }, 300);
}

function tick(){
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('en-GB', { hour12:false });
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
